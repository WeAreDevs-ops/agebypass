# Nixpacks configuration for Railway deployment with Puppeteer/Chrome

[phases.setup]
nixPkgs = [
    "nodejs_20",
    "npm-9_x",
    # Chrome dependencies
    "fontconfig",
    "freetype",
    "nss",
    "nspr",
    "atk",
    "at-spi2-atk",
    "xorg.libXcomposite",
    "xorg.libXdamage",
    "xorg.libXrandr",
    "xorg.libXScrnSaver",
    "xorg.libXtst",
    "xorg.libxkbcommon",
    "xorg.libxshmfence",
    "glibc",
    "dbus",
    "expat",
    "libdrm",
    "mesa",
    "alsa-lib",
    "cups",
    "pango",
    "cairo",
    "gdk-pixbuf",
    "gtk3",
    "libgbm",
    # Additional fonts
    "noto-fonts",
    "noto-fonts-cjk"
]

[phases.build]
cmds = [
    "npm install",
    "npx puppeteer browsers install chrome || true"
]

[phases.setup.env]
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"
PUPPETEER_SKIP_DOWNLOAD = "false"
PUPPETEER_DOWNLOAD_HOST = "https://storage.googleapis.com"

[start]
cmd = "node birthdate-server-railway.js"
